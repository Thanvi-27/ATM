<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="atm-machine">
            <div class="header">
                <h1>🏦 ATM Machine</h1>
                <p>Welcome to Your Banking Solution</p>
            </div>

            <div class="content">
                <!-- Balance Section -->
                <div id="balanceSection" class="balance-section hidden">
                    <h2>Current Balance</h2>
                    <div class="balance-display">
                        <span class="currency">Rs</span>
                        <span id="balanceAmount"></span>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button class="btn btn-deposit" onclick="showDepositForm()">
                        <span class="icon">💳</span>
                        Deposit
                    </button>
                    <button class="btn btn-withdraw" onclick="showWithdrawForm()">
                        <span class="icon">💰</span>
                        Withdraw
                    </button>
                    <button class="btn btn-check" onclick="showBalance()">
                        <span class="icon">🔄</span>
                        Check Balance
                    </button>
                    <button class="btn btn-history" onclick="showTransactions()">
                        <span class="icon">📋</span>
                        History
                    </button>
                </div>

                <!-- Forms -->
                <div id="depositForm" class="form-container hidden">
                    <h3>Deposit Amount</h3>
                    <div class="form-group">
                        <label for="depositAmount">Amount (Rs):</label>
                        <input type="number" id="depositAmount" placeholder="Enter amount" min="1" step="0.01">
                    </div>
                    <div class="form-buttons">
                        <button class="btn btn-submit" onclick="processDeposit()">Confirm Deposit</button>
                        <button class="btn btn-cancel" onclick="hideForm()">Cancel</button>
                    </div>
                </div>

                <div id="withdrawForm" class="form-container hidden">
                    <h3>Withdraw Amount</h3>
                    <div class="form-group">
                        <label for="withdrawAmount">Amount (Rs):</label>
                        <input type="number" id="withdrawAmount" placeholder="Enter amount" min="1" step="0.01">
                    </div>
                    <div class="form-buttons">
                        <button class="btn btn-submit" onclick="processWithdraw()">Confirm Withdrawal</button>
                        <button class="btn btn-cancel" onclick="hideForm()">Cancel</button>
                    </div>
                </div>

                <!-- Transaction History -->
                <div id="historySection" class="history-container hidden">
                    <h3>Transaction History</h3>
                    <div id="transactionList" class="transaction-list">
                        <p class="empty-message">No transactions yet.</p>
                    </div>
                    <button class="btn btn-cancel" onclick="hideHistory()">Close</button>
                </div>

                <!-- Alert Messages -->
                <div id="alertBox" class="alert-box hidden"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
